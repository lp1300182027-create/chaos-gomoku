<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">

<title>超离谱技能五子棋！</title>
<style>
:root{--bg:#100b16;--panel:#21172b;--panel2:#31213d;--gold:#ffd36e;--cyan:#63f4e4;--pink:#ff5ca8;--ink:#f8edf8;--muted:#b8a5c7;--danger:#ff784f}*{box-sizing:border-box}html,body{margin:0;height:100%;overflow:hidden;background:radial-gradient(circle at 18% 8%,#50305f 0,#20142a 34%,#0b0810 100%);color:var(--ink);font-family:"PingFang SC","Microsoft YaHei",system-ui,sans-serif}button{font:inherit;color:inherit}#app{height:100%;display:grid;grid-template-columns:minmax(420px,1fr) 380px;gap:16px;padding:16px}#boardWrap{position:relative;min-width:0;border-radius:28px;background:linear-gradient(145deg,#2b1b35,#100b16);box-shadow:0 22px 70px #000a,inset 0 1px 0 #ffffff22;overflow:hidden}canvas{width:100%;height:100%;display:block;touch-action:none}#side{display:flex;flex-direction:column;gap:12px;min-height:0}.card{border:1px solid #ffffff18;border-radius:24px;background:linear-gradient(180deg,#2d1f38,#17101f);box-shadow:0 18px 52px #0007,inset 0 1px 0 #ffffff18;padding:16px}.brand{display:flex;gap:12px;align-items:center}.logo{width:54px;height:54px;border-radius:18px;background:conic-gradient(from 90deg,var(--gold),var(--pink),var(--cyan),var(--gold));box-shadow:0 0 28px #ff5ca844}.brand h1{font-size:28px;line-height:1;margin:0}.brand p{margin:6px 0 0;color:var(--muted)}.stat{display:grid;grid-template-columns:1fr 1fr;gap:10px}.stat div{border-radius:18px;background:#ffffff0e;padding:12px}.label{display:block;color:var(--muted);font-size:12px;margin-bottom:4px}.big{font-weight:900;font-size:20px}.blackStone,.whiteStone{display:inline-block;width:13px;height:13px;border-radius:50%;margin-right:7px;vertical-align:-1px}.blackStone{background:#15151d;box-shadow:inset 0 0 0 2px #596078}.whiteStone{background:#fff1d5}.modes{display:grid;grid-template-columns:1fr 1fr;gap:10px}.modes button,.restart{border:0;border-radius:16px;background:#ffffff12;padding:11px 12px;cursor:pointer}.modes button.active,.restart:hover{background:var(--gold);color:#1b1024;font-weight:800}.skills{display:grid;grid-template-columns:1fr 1fr;gap:10px;overflow:auto;padding-right:2px}.skill{border:1px solid #ffffff1a;border-radius:18px;background:linear-gradient(135deg,#ffffff13,#ffffff08);padding:12px;text-align:left;cursor:pointer;min-height:118px}.skill strong{display:flex;justify-content:space-between;gap:8px;color:#fff3c6}.skill small{display:block;margin-top:7px;color:#cdbed7;line-height:1.35}.skill b{color:var(--cyan);font-weight:800}.skill.active{border-color:var(--cyan);box-shadow:0 0 0 2px #63f4e433,0 0 28px #63f4e422}.skill:disabled{opacity:.38;cursor:not-allowed}.log{min-height:96px;line-height:1.55;color:#f8e8d9}.log em{color:var(--gold);font-style:normal}.hint{font-size:13px;line-height:1.55;color:var(--muted)}.danger{color:var(--danger)}#dev{position:fixed;left:8px;top:8px;background:#000b;color:#8dffb1;padding:4px 7px;border-radius:7px;font:12px ui-monospace,monospace;display:none}@media(max-width:900px){#app{grid-template-columns:1fr;grid-template-rows:minmax(380px,58vh) 1fr;padding:10px;gap:10px}#side{min-height:0}.brand h1{font-size:22px}.skills{grid-template-columns:1fr 1fr}.skill{min-height:92px}.skill small{display:none}}@media(max-width:520px){#app{grid-template-rows:50vh 1fr}.stat{grid-template-columns:1fr 1fr}.skills{grid-template-columns:1fr}.card{padding:12px;border-radius:20px}.logo{width:42px;height:42px}.log{min-height:68px}}
.history{max-height:120px;overflow:auto;font-size:13px;line-height:1.45;color:#cdbed7}.history div{padding:5px 0;border-bottom:1px solid #ffffff12}.history b{color:var(--gold)}.difficulty{display:grid;grid-template-columns:72px repeat(4,1fr);gap:8px;align-items:center}.difficulty span{color:var(--muted);font-size:13px}.difficulty button{border:0;border-radius:13px;background:#ffffff12;padding:8px 6px;cursor:pointer}.difficulty button.active{background:var(--cyan);color:#10201f;font-weight:900}.skill.attack{border-color:#ff784f55}.skill.control{border-color:#63f4e455}.skill.trick{border-color:#b78cff55}.skill.trap{border-color:#ffd36e66}.skill.attack strong span{color:#ffb199}.skill.control strong span{color:#a8fff7}.skill.trick strong span{color:#d7bdff}.skill.trap strong span{color:#ffe5a0}
@media(max-width:900px){html,body{height:auto;min-height:100%;overflow:auto;-webkit-overflow-scrolling:touch}#app{height:auto;min-height:100vh;grid-template-rows:minmax(340px,52vh) auto;padding-bottom:164px}#side{overflow:visible;padding-bottom:22px}.skills{position:fixed;left:8px;right:8px;bottom:8px;z-index:20;display:flex;gap:8px;overflow-x:auto;overflow-y:hidden;padding:10px;border-radius:20px;background:linear-gradient(180deg,#2d1f38f2,#17101ff2);box-shadow:0 -10px 36px #0009,inset 0 1px 0 #ffffff18;backdrop-filter:blur(10px)}.skill{min-width:132px;min-height:74px;padding:10px}.skill strong{font-size:14px}.skill small{display:none}.history{max-height:none}.difficulty{grid-template-columns:64px repeat(4,1fr)}}@media(max-width:520px){#app{grid-template-rows:43vh auto}.skill small{display:none}.skill{min-height:72px}.brand p{display:none}.difficulty{font-size:12px}.difficulty button{padding:7px 4px}}
</style>
</head>
<body>
<div id="app">
  <main id="boardWrap"><canvas id="board" aria-label="离谱成语技能五子棋棋盘"></canvas></main>
  <aside id="side">
    <section class="card brand"><div class="logo"></div><div><h1>超离谱技能五子棋！</h1><p>传统五子棋？好无趣。加入技能？好好玩，要爆了。</p></div></section>
    <section class="card stat">
      <div><span class="label">当前回合</span><span class="big" id="turnText"></span></div>
      <div><span class="label">怒气</span><span class="big" id="rageText"></span></div>
      <div><span class="label">模式</span><span id="modeText"></span></div>
      <div><span class="label">状态</span><span id="stateText"></span></div>
    </section>
    <section class="card modes"><button id="aiBtn">人机练手</button><button id="duelBtn">双人互殴</button><button class="restart" id="restartBtn">重新开癫</button><button class="restart" id="cancelBtn">收起技能</button></section>
    <section class="card difficulty" id="difficulty"><span>AI难度</span><button data-level="easy">简单</button><button data-level="normal" class="active">普通</button><button data-level="hard">困难</button><button data-level="mad">癫狂</button></section>
    <section class="card skills" id="skills"></section>
    <section class="card log" id="log"></section>
    <section class="card history" id="history"></section>
    <section class="card hint">操作：鼠标/触控点棋盘；方向键移动光标，空格落子或确认技能。技能都很离谱，但棋还是要五个连成线才算赢，除非你用了更离谱的。</section>
  </aside>
</div>
<div id="dev"></div>
<script>
const N=15, E=0, B=1, W=2;
const SKILLS=[
  {id:"sand",name:"飞沙走石",cost:3,cd:3,target:"enemy",kind:"attack",text:"选一颗敌子，把它扔进什刹海：直接移除。"},
  {id:"still",name:"静如止水",cost:2,cd:4,target:"none",kind:"control",text:"凝结时间冻结空气：对手被冻结，你可以连续下两子。"},
  {id:"mountain",name:"力拔山兮",cost:5,cd:5,target:"empty",kind:"attack",text:"棋盘：危。若此处能形成四连，直接判你赢。"},
  {id:"reverse",name:"两极反转",cost:3,cd:4,target:"none",kind:"trick",text:"把整个棋盘旋转180度。不是翻盘，胜似翻盘。"},
  {id:"swap",name:"偷梁换柱",cost:3,cd:3,target:"any2",kind:"trick",text:"先后选择两颗棋子，交换位置。伦理委员会已下线。"},
  {id:"deer",name:"指鹿为马",cost:4,cd:4,target:"enemy",kind:"trick",text:"选一颗敌子，强行说它是你的。它还真信了。"},
  {id:"create",name:"锦上添花",cost:4,cd:4,target:"empty",kind:"trap",text:"选一个空位落下一颗气势棋，特效很大，听起来非常有用。"},
  {id:"revive",name:"借尸还魂",cost:3,cd:3,target:"empty",kind:"trick",text:"把一颗被移除的己方棋子复活到空位。没有尸体就很尴尬。"},
  {id:"rescue",name:"围魏救赵",cost:3,cd:4,target:"empty",kind:"control",text:"指定一个空位，对手下回合必须堵那里。强买强卖型战术。"},
  {id:"prison",name:"画地为牢",cost:3,cd:4,target:"empty",kind:"control",text:"选中心画出3x3禁区，对手下一回合不能落入。"},
  {id:"guest",name:"反客为主",cost:5,cd:5,target:"none",kind:"trick",text:"下一回合你替对手落子。棋权转移，责任不转移。"},
  {id:"justice",name:"天降正义",cost:2,cd:3,target:"none",kind:"attack",text:"随机砸掉棋盘上一颗棋子。公平，就是谁也不知道谁倒霉。"}
];
const LINES=[[1,0],[0,1],[1,1],[1,-1]];
const cvs=document.getElementById("board"),ctx=cvs.getContext("2d"),dev=document.getElementById("dev");
const el={turn:gid("turnText"),rage:gid("rageText"),mode:gid("modeText"),state:gid("stateText"),log:gid("log"),history:gid("history"),skills:gid("skills"),ai:gid("aiBtn"),duel:gid("duelBtn"),restart:gid("restartBtn"),cancel:gid("cancelBtn")};
let g,lay,selected=null,pick=null,cursor={x:7,y:7},busy=false,held=new Set(),last=performance.now(),frames=0,fpsAt=last,audioCtx=null,aiLevel="normal";
const AUDIO_FILES={sand:"./assets/audio/飞沙走石（李嘉诚版）.mp3",still:"./assets/audio/静如止水.mp3",mountain:"./assets/audio/力拔山兮.mp3",reverse:"./assets/audio/两极反转.mp3",danger:"./assets/audio/你要输了.mp3"};
const clips={};
const devOn=new URLSearchParams(location.search).has("dev"); if(devOn)dev.style.display="block";
function gid(id){return document.getElementById(id)}
function aiCfg(){return {easy:{skill:.32,look:.45,random:.12,top:7},normal:{skill:.5,look:.72,random:.04,top:4},hard:{skill:.64,look:.9,random:.015,top:2},mad:{skill:.78,look:1,random:0,top:1}}[aiLevel]}
function preloadClips(){for(const [k,src] of Object.entries(AUDIO_FILES)){const a=new Audio(src);a.preload="auto";clips[k]=a}}
function playClip(id){const base=clips[id];if(!base)return false;const a=base.cloneNode();a.volume=.9;a.play().catch(()=>{});return true}
function audio(){audioCtx=audioCtx||new (window.AudioContext||window.webkitAudioContext)();if(audioCtx.state==="suspended")audioCtx.resume();return audioCtx}
function tone(freq,dur,type="sine",gain=.08,delay=0){const ac=audio(),t=ac.currentTime+delay,o=ac.createOscillator(),g=ac.createGain();o.type=type;o.frequency.setValueAtTime(freq,t);g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(gain,t+.012);g.gain.exponentialRampToValueAtTime(.001,t+dur);o.connect(g);g.connect(ac.destination);o.start(t);o.stop(t+dur+.03)}
function noise(dur,gain=.08,delay=0){const ac=audio(),t=ac.currentTime+delay,buf=ac.createBuffer(1,ac.sampleRate*dur,ac.sampleRate),data=buf.getChannelData(0);for(let i=0;i<data.length;i++)data[i]=(Math.random()*2-1)*(1-i/data.length);const src=ac.createBufferSource(),g=ac.createGain(),f=ac.createBiquadFilter();src.buffer=buf;f.type="lowpass";f.frequency.setValueAtTime(900,t);g.gain.setValueAtTime(gain,t);g.gain.exponentialRampToValueAtTime(.001,t+dur);src.connect(f);f.connect(g);g.connect(ac.destination);src.start(t);src.stop(t+dur)}
function sfx(kind){try{if(AUDIO_FILES[kind]&&playClip(kind))return;if(kind==="stone"){tone(180,.07,"triangle",.09);tone(95,.09,"sine",.045,.015);noise(.045,.025)}else if(kind==="skill"){tone(520,.12,"sawtooth",.045);tone(780,.16,"triangle",.055,.07);noise(.18,.055,.03)}else if(kind==="win"){tone(392,.12,"triangle",.07);tone(523,.16,"triangle",.07,.11);tone(784,.24,"triangle",.08,.24)}else if(kind==="bad"){tone(120,.16,"sawtooth",.05);noise(.12,.035)}}catch(e){}}
function fresh(ai=true){g={board:Array.from({length:N},()=>Array(N).fill(E)),turn:B,rage:{1:2,2:2},cd:{1:{},2:{}},ai,over:false,winner:0,line:[],last:null,skip:{1:0,2:0},puppet:{1:false,2:false},forced:{1:null,2:null},grave:{1:0,2:0},jails:[],moves:0,warned:{},msg:"外练筋骨皮，内练五子棋。请落子。",fx:null,marks:[],history:["<b>开局</b>：传统五子棋加入技能，好玩到要爆了。"]};selected=null;pick=null;busy=false;cursor={x:7,y:7};sync();}
function playerName(p){return p===B?"黑棋":"白棋"}
function other(p){return p===B?W:B}
function inb(x,y){return x>=0&&y>=0&&x<N&&y<N}
function say(s){g.msg=s;sync()}
function logAction(s){g.history.unshift(s);g.history=g.history.slice(0,8)}
function flash(text,cells=[],color="#63f4e4"){const clean=(cells||[]).filter(c=>c&&inb(c.x,c.y));g.fx={text,cells:clean,color,until:performance.now()+1150};for(const c of clean)g.marks.push({x:c.x,y:c.y,color,text,until:performance.now()+2200});g.marks=g.marks.slice(-18)}
function legalSkill(s,p){return !g.over&&!busy&&g.rage[p]>=s.cost&&!(g.cd[p][s.id]>0)}
function sync(){el.turn.innerHTML=`<span class="${g.turn===B?"blackStone":"whiteStone"}"></span>${playerName(g.turn)}`;el.rage.textContent=`${g.rage[g.turn]}/6`;el.mode.textContent=g.ai?"人机练手":"双人互殴";el.state.textContent=g.over?"本局已炸":g.puppet[g.turn]?"代下回合":"正在发癫";el.log.innerHTML=g.msg;el.history.innerHTML=g.history.map(x=>`<div>${x}</div>`).join("");el.ai.classList.toggle("active",g.ai);el.duel.classList.toggle("active",!g.ai);for(const btn of el.skills.querySelectorAll("button")){const s=SKILLS.find(v=>v.id===btn.dataset.id),cd=g.cd[g.turn][s.id]||0;btn.classList.toggle("active",selected===s.id);btn.disabled=!legalSkill(s,g.turn)||(g.ai&&g.turn===W&&!g.puppet[W]);btn.querySelector("b").textContent=cd?`冷却${cd}`:`怒${s.cost}`;}}
function skillList(){return [...SKILLS].sort((a,b)=>a.cost-b.cost||a.cd-b.cd||a.name.localeCompare(b.name,"zh-CN"))}
function buildSkills(){el.skills.innerHTML="";for(const s of skillList()){const b=document.createElement("button");b.className=`skill ${s.kind}`;b.dataset.id=s.id;b.innerHTML=`<strong><span>${s.name}</span><b></b></strong><small>${s.text}</small>`;b.onclick=()=>{if(!legalSkill(s,g.turn))return;selected=selected===s.id?null:s.id;pick=null;say(selected?`<em>${s.name}</em> 已备好：${s.text}`:"收功。此刻你像个正常棋手。")};el.skills.appendChild(b)}}
function endTurn(origin){if(g.over)return;const p=g.turn;if(origin)logAction(origin);g.moves++;for(const k of Object.keys(g.cd[p])){g.cd[p][k]--;if(g.cd[p][k]<=0)delete g.cd[p][k]}g.rage[p]=Math.min(6,g.rage[p]+1);g.jails=g.jails.filter(j=>j.owner===p);let np=other(p);selected=null;pick=null;if(g.skip[np]>0){g.skip[np]--;g.forced[np]=null;g.puppet[np]=false;g.jails=g.jails.filter(j=>j.owner===np);g.turn=p;say(`${playerName(np)} 被<em>静如止水</em>冻成了桌游摆件，${playerName(p)} 还能继续下。${origin||""}`);if(!g.over)checkFourWarning();if(shouldAiMove()){busy=true;setTimeout(aiMove,520)}return}g.turn=np;say(origin||`${playerName(g.turn)} 请落子。`);if(g.puppet[g.turn])say(`${origin||""}<br><em>反客为主</em>生效：现在由对手替 ${playerName(g.turn)} 落一子。`);if(!g.over)checkFourWarning();if(shouldAiMove()){busy=true;setTimeout(aiMove,520)}}
function shouldAiMove(){return g.ai&&g.turn===W&&!g.over&&!g.puppet[W]}
function cellJailed(x,y,p){return g.jails.some(j=>j.owner!==p&&Math.abs(j.x-x)<=1&&Math.abs(j.y-y)<=1)}
function place(x,y){if(g.over||busy||!inb(x,y))return;if(g.board[y][x]){sfx("bad");return say("这里已经有棋了。你这一步叫《重复建设》。")}if(cellJailed(x,y,g.turn)){sfx("bad");return say("此地已被<em>画地为牢</em>，进去要写检讨。")}const forced=g.forced[g.turn];if(forced&&(forced.x!==x||forced.y!==y)&&!g.board[forced.y][forced.x]){sfx("bad");return say(`你被<em>围魏救赵</em>点名了，必须先下 ${coord(forced.x,forced.y)}。`)}g.board[y][x]=g.turn;sfx("stone");g.last={x,y,p:g.turn};g.forced[g.turn]=null;g.puppet[g.turn]=false;const line=winLine(x,y,g.turn);if(line)return win(g.turn,line,`${playerName(g.turn)} 五子连珠，赢得很传统，但很有效。`);if(full())return draw();endTurn(`${playerName(g.last.p)} 落子 ${coord(x,y)}。`) }
function useSkillAt(x,y){const s=SKILLS.find(v=>v.id===selected),p=g.turn;if(!s||!legalSkill(s,p))return;if(s.target!=="none"&&!inb(x,y))return;
  if(s.id==="sand"){if(g.board[y][x]!==other(p))return say("飞沙走石只能扔对手的棋子，不许把自己人扔什刹海。");g.grave[other(p)]++;g.board[y][x]=E;pay(s);endTurn(`${playerName(p)} 使出<em>飞沙走石</em>：${coord(x,y)} 的棋子被扔进什刹海。`);return}
  if(s.id==="deer"){if(g.board[y][x]!==other(p))return say("指鹿为马要指对手的鹿，别指自己。哲学过量了。");g.board[y][x]=p;g.last={x,y,p};pay(s);const line=winLine(x,y,p);if(line)return win(p,line,`${playerName(p)} 使出<em>指鹿为马</em>，对方棋子当场改户口并连成五子。`);endTurn(`${playerName(p)} 使出<em>指鹿为马</em>：这不是敌子，这是我方卧底。`);return}
  if(s.id==="mountain"){if(g.board[y][x])return say("力拔山兮需要一个空位，不是力拔棋子。稍微讲点物理。 ");const score=maxLineIf(x,y,p);pay(s);if(score>=4){g.board[y][x]=p;g.last={x,y,p};return win(p,lineThrough(x,y,p),`${playerName(p)} 使出<em>力拔山兮</em>：棋盘被气势震裂，四连按五连结算！`)}g.board[y][x]=p;g.last={x,y,p};endTurn(`${playerName(p)} 使出<em>力拔山兮</em>，但山没拔动，只好老实落子。`);return}
  if(s.id==="swap"){if(!g.board[y][x])return say("偷梁换柱至少得有个梁。空地不算梁。");if(!pick){pick={x,y};say(`已选择 ${coord(x,y)}，再选另一颗棋子交换。`);return}const a=pick,b={x,y},tmp=g.board[a.y][a.x];g.board[a.y][a.x]=g.board[b.y][b.x];g.board[b.y][b.x]=tmp;pay(s,[a,b]);const l1=winLine(a.x,a.y,g.board[a.y][a.x]);const l2=winLine(b.x,b.y,g.board[b.y][b.x]);if(l1)return win(g.board[a.y][a.x],l1,"偷梁换柱换出了五连，裁判正在怀疑人生。");if(l2)return win(g.board[b.y][b.x],l2,"偷梁换柱换出了五连，棋德没有了，胜利来了。 ");endTurn(`${playerName(p)} 使出<em>偷梁换柱</em>：${coord(a.x,a.y)} 和 ${coord(b.x,b.y)} 互换。`);return}

function drawFx(){if(!g.fx)return;const left=g.fx.until-performance.now();if(left<=0){g.fx=null;return}const t=Math.max(0,Math.min(1,left/1150)),pulse=1+(1-t)*.45;ctx.save();for(const c of g.fx.cells||[])if(c&&inb(c.x,c.y)){const cx=lay.ox+c.x*lay.cell,cy=lay.oy+c.y*lay.cell;ctx.beginPath();ctx.arc(cx,cy,lay.cell*.55*pulse,0,Math.PI*2);ctx.strokeStyle=g.fx.color;ctx.lineWidth=5*t+2;ctx.shadowColor=g.fx.color;ctx.shadowBlur=24*t;ctx.stroke()}ctx.globalAlpha=.9*t;ctx.fillStyle=g.fx.color;ctx.strokeStyle="#180b14";ctx.lineWidth=6;ctx.font=`900 ${Math.round(30+18*(1-t))}px system-ui, sans-serif`;ctx.textAlign="center";ctx.textBaseline="middle";ctx.strokeText(g.fx.text,lay.w/2,lay.h/2);ctx.fillText(g.fx.text,lay.w/2,lay.h/2);ctx.restore()}
function drawMarks(){const now=performance.now();g.marks=g.marks.filter(m=>m.until>now);ctx.save();for(const m of g.marks){const t=(m.until-now)/2200,cx=lay.ox+m.x*lay.cell,cy=lay.oy+m.y*lay.cell,r=lay.cell*(.46+.16*(1-t));ctx.globalAlpha=Math.max(.08,.38*t);ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fillStyle=m.color;ctx.fill();ctx.globalAlpha=Math.max(.25,.9*t);ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.strokeStyle=m.color;ctx.lineWidth=Math.max(2,lay.cell*.045);ctx.stroke()}ctx.restore()}
function drawJail(j){const x=lay.ox+(j.x-1)*lay.cell-lay.cell*.42,y=lay.oy+(j.y-1)*lay.cell-lay.cell*.42,w=lay.cell*2.84;ctx.save();ctx.globalAlpha=.2;ctx.fillStyle="#ff784f";round(x,y,w,w,12);ctx.fill();ctx.globalAlpha=.85;ctx.strokeStyle="#ff784f";ctx.lineWidth=Math.max(2,lay.cell*.04);ctx.setLineDash([lay.cell*.18,lay.cell*.12]);ctx.stroke();ctx.setLineDash([]);ctx.restore()}
function winBeam(){const a=g.line[0],b=g.line[g.line.length-1];ctx.beginPath();ctx.moveTo(lay.ox+a.x*lay.cell,lay.oy+a.y*lay.cell);ctx.lineTo(lay.ox+b.x*lay.cell,lay.oy+b.y*lay.cell);ctx.strokeStyle="#ff5ca8";ctx.lineWidth=lay.cell*.2;ctx.lineCap="round";ctx.shadowColor="#ff5ca8";ctx.shadowBlur=18;ctx.stroke();ctx.shadowBlur=0}
function round(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath()}
function boardPoint(clientX,clientY){const r=cvs.getBoundingClientRect();return pointCell(clientX-r.left,clientY-r.top)}
let lastTouchAt=0;
cvs.addEventListener("pointermove",e=>{const c=boardPoint(e.clientX,e.clientY);if(c)cursor=c});
cvs.addEventListener("pointerdown",e=>{lastTouchAt=performance.now();const c=boardPoint(e.clientX,e.clientY);if(c)act(c.x,c.y)});
cvs.addEventListener("touchstart",e=>{const t=e.changedTouches&&e.changedTouches[0];if(!t)return;lastTouchAt=performance.now();const c=boardPoint(t.clientX,t.clientY);if(c)act(c.x,c.y);e.preventDefault()},{passive:false});
cvs.addEventListener("click",e=>{if(performance.now()-lastTouchAt<450)return;const c=boardPoint(e.clientX,e.clientY);if(c)act(c.x,c.y)});
addEventListener("keydown",e=>{const d={ArrowLeft:[-1,0],ArrowRight:[1,0],ArrowUp:[0,-1],ArrowDown:[0,1]}[e.code];if(d){cursor.x=Math.max(0,Math.min(N-1,cursor.x+d[0]));cursor.y=Math.max(0,Math.min(N-1,cursor.y+d[1]));e.preventDefault()}if(e.code==="Space"||e.code==="Enter"){act(cursor.x,cursor.y);e.preventDefault()}if(e.code==="Escape"){selected=null;pick=null;say("技能收回。棋盘松了一口气。")}});
el.ai.onclick=()=>fresh(true);el.duel.onclick=()=>fresh(false);el.restart.onclick=()=>fresh(g.ai);el.cancel.onclick=()=>{selected=null;pick=null;say("技能收回。你暂时恢复了正常。")};
for(const b of document.querySelectorAll("#difficulty button"))b.onclick=()=>{aiLevel=b.dataset.level;for(const x of document.querySelectorAll("#difficulty button"))x.classList.toggle("active",x===b);say(`AI难度已切换：${b.textContent}。下一手开始生效。`)};
addEventListener("resize",resize);addEventListener("orientationchange",resize);
function frame(now){requestAnimationFrame(frame);render();if(devOn&&(frames++,now-fpsAt>500)){dev.textContent=`${Math.round(frames*1000/(now-fpsAt))} fps`;frames=0;fpsAt=now}}
preloadClips();buildSkills();resize();fresh(true);requestAnimationFrame(frame);
</script>
